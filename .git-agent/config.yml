scopes:
    - name: cli
      description: command-line tools and entrypoints in cli/; does not include trading logic from tradingagents/
    - name: ta
      description: core trading agents, LLM clients, dataflows, and graph logic in tradingagents/; excludes CLI utilities and runtime logs
    - name: results
      description: runtime data outputs, logs, and reports generated at runtime in results/; does not contain source code
